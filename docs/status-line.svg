<svg xmlns="http://www.w3.org/2000/svg" width="760" height="48" viewBox="0 0 760 48" role="img" aria-labelledby="title desc">
  <title id="title">claude-status-line example output</title>
  <desc id="desc">Example status line with colored segments for branch, context usage, rate limits, and model effort.</desc>
  <rect width="650" height="48" fill="#1e1e1e" />

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="16" font-weight="600" dominant-baseline="middle">
    <rect x="16" y="12" width="208" height="24" fill="#5f5f87" />
    <text x="28" y="25" fill="#ffffff">worktree-my-feature</text>

    <rect x="235" y="12" width="91" height="24" fill="#00af00" />
    <text x="247" y="25" fill="#000000">ctx 32%</text>

    <rect x="337" y="12" width="81" height="24" fill="#ff0020" />
    <text x="349" y="25" fill="#000000">5h 81%</text>

    <rect x="430" y="12" width="81" height="24" fill="#ffef00" />
    <text x="442" y="25" fill="#000000">7d 65%</text>

    <rect x="523" y="12" width="112" height="24" fill="#005f87" />
    <text x="535" y="25" fill="#ffffff">Opus|high</text>
  </g>
</svg>
